[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# NOTE: This config applies to the main API service only.
# The Celery worker service uses Dockerfile.worker and is configured
# separately in the Railway dashboard (no healthcheck — it is not an HTTP service).
[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
